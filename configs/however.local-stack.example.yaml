# HoweverPromptfoo local stack profile
# Use this file as a safe starting point for local/private deployments.

providers:
  - id: openai:gpt-5-mini
    config:
      apiBaseUrl: '${HOWEVER_OPENAI_BASE_URL}'
      apiKeyEnvar: OPENAI_API_KEY

  - id: ollama:llama3.1
    config:
      apiBaseUrl: '${OLLAMA_BASE_URL}'
      apiKeyEnvar: OLLAMA_API_KEY

storage:
  database:
    url: '${HOWEVER_DB_URL}'
  cache:
    redisUrl: '${HOWEVER_REDIS_URL}'

telemetry:
  otlpEndpoint: '${OTEL_EXPORTER_OTLP_ENDPOINT}'
